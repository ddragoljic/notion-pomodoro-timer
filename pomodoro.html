<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lora', Georgia, serif; background: transparent; padding: 1.25rem; }

  .card {
    background: #fdf8f2; border-radius: 16px;
    padding: 2rem; position: relative; overflow: hidden;
    text-align: center;
  }

  .watercolor-tl {
    position: absolute; top: -40px; left: -40px;
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, rgba(180,200,220,0.16), rgba(210,190,215,0.10), transparent 70%);
    pointer-events: none;
  }
  .watercolor-br {
    position: absolute; bottom: -40px; right: -30px;
    width: 180px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, rgba(210,185,155,0.14), rgba(195,210,190,0.09), transparent 70%);
    pointer-events: none;
  }

  .header {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: #9a8c7e;
    margin-bottom: 1rem;
  }

  .border-top {
    height: 2px;
    background: linear-gradient(to right, transparent, #c8b8a8 20%, #b8c4c0 50%, #c4b0bc 80%, transparent);
    border-radius: 999px; margin-bottom: 1.5rem;
  }

  .mode-row {
    display: flex; justify-content: center; gap: 8px; margin-bottom: 1.5rem;
  }

  .mode-btn {
    font-family: 'Lora', Georgia, serif;
    font-size: 12px; font-style: italic;
    padding: 4px 14px; border-radius: 999px;
    border: 0.5px solid #d4c4b0;
    background: transparent; color: #9a8c7e; cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active { background: #7a6a55; color: #fdf8f2; border-color: #7a6a55; }
  .mode-btn:hover:not(.active) { background: #f0e8dc; }

  .timer-ring { position: relative; width: 180px; height: 180px; margin: 0 auto 1.5rem; }

  .timer-ring svg { transform: rotate(-90deg); }

  .ring-bg { fill: none; stroke: #ede5d8; stroke-width: 6; }
  .ring-fill { fill: none; stroke-width: 6; stroke-linecap: round;
    stroke: url(#ringGrad);
    stroke-dasharray: 502;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
  }

  .timer-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .timer-display {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 42px; font-weight: 500; color: #5c4f3d;
    line-height: 1;
  }

  .timer-sublabel {
    font-size: 11px; color: #a8977f; font-style: italic; margin-top: 4px;
  }

  .session-count {
    font-size: 12px; color: #b0a090; font-style: italic; margin-bottom: 1.25rem;
  }

  .session-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 1.5rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ede5d8; transition: background 0.3s; }
  .dot.done { background: #b8c4c0; }
  .dot.active { background: #c4adb8; }

  .controls { display: flex; justify-content: center; gap: 10px; }

  .ctrl-btn {
    font-family: 'Lora', Georgia, serif;
    font-size: 13px; font-style: italic;
    padding: 7px 20px; border-radius: 8px;
    border: 0.5px solid #d4c4b0;
    background: rgba(255,255,255,0.7); color: #7a6a55; cursor: pointer;
  }
  .ctrl-btn:hover { background: #f0e8dc; }
  .ctrl-btn.primary { background: #7a6a55; color: #fdf8f2; border-color: #7a6a55; font-style: normal; }
  .ctrl-btn.primary:hover { background: #6a5a47; }
</style>
</head>
<body>
<div class="card">
  <div class="watercolor-tl"></div>
  <div class="watercolor-br"></div>

  <div class="header">focus session</div>
  <div class="border-top"></div>

  <div class="mode-row">
    <button class="mode-btn active" onclick="setMode('focus')">focus</button>
    <button class="mode-btn" onclick="setMode('short')">short break</button>
    <button class="mode-btn" onclick="setMode('long')">long break</button>
  </div>

  <div class="timer-ring">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#b8c9b0"/>
          <stop offset="50%" style="stop-color:#a8b8c8"/>
          <stop offset="100%" style="stop-color:#c4adb8"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="90" cy="90" r="80"/>
      <circle class="ring-fill" id="ring" cx="90" cy="90" r="80"/>
    </svg>
    <div class="timer-text">
      <div class="timer-display" id="display">25:00</div>
      <div class="timer-sublabel" id="sublabel">ready to focus</div>
    </div>
  </div>

  <div class="session-dots" id="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="session-count" id="session-count">session 1 of 4</div>

  <div class="controls">
    <button class="ctrl-btn" onclick="reset()">reset</button>
    <button class="ctrl-btn primary" id="start-btn" onclick="toggle()">start</button>
    <button class="ctrl-btn" onclick="skip()">skip</button>
  </div>
</div>

<script>
const MODES = {
  focus: { duration: 25 * 60, label: "time to focus", done: "well done ✨" },
  short: { duration: 5 * 60, label: "short rest", done: "break over" },
  long: { duration: 15 * 60, label: "long rest", done: "refreshed?" }
};

let mode = "focus";
let total = MODES.focus.duration;
let remaining = total;
let running = false;
let interval = null;
let session = 1;
let completedSessions = 0;
const CIRCUMFERENCE = 2 * Math.PI * 80;

function setMode(m) {
  mode = m;
  document.querySelectorAll(".mode-btn").forEach((b, i) => {
    b.classList.toggle("active", ["focus","short","long"][i] === m);
  });
  total = MODES[m].duration;
  remaining = total;
  running = false;
  clearInterval(interval);
  document.getElementById("start-btn").textContent = "start";
  document.getElementById("sublabel").textContent = MODES[m].label;
  render();
}

function render() {
  const m = Math.floor(remaining / 60).toString().padStart(2, "0");
  const s = (remaining % 60).toString().padStart(2, "0");
  document.getElementById("display").textContent = `${m}:${s}`;
  const pct = remaining / total;
  document.getElementById("ring").style.strokeDashoffset = CIRCUMFERENCE * pct;

  const dots = document.querySelectorAll(".dot");
  dots.forEach((d, i) => {
    d.classList.remove("done", "active");
    if (i < completedSessions) d.classList.add("done");
    else if (i === (session - 1)) d.classList.add("active");
  });
  document.getElementById("session-count").textContent =
    mode === "focus" ? `session ${session} of 4` : `enjoy your break ☕`;
}

function toggle() {
  if (running) {
    running = false;
    clearInterval(interval);
    document.getElementById("start-btn").textContent = "resume";
    document.getElementById("sublabel").textContent = "paused";
  } else {
    running = true;
    document.getElementById("start-btn").textContent = "pause";
    document.getElementById("sublabel").textContent = MODES[mode].label;
    interval = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(interval);
        running = false;
        document.getElementById("sublabel").textContent = MODES[mode].done;
        document.getElementById("start-btn").textContent = "start";
        if (mode === "focus") {
          completedSessions = Math.min(4, completedSessions + 1);
          session = Math.min(4, session + 1);
          if (completedSessions >= 4) completedSessions = 0;
        }
        try { new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play(); } catch(e) {}
      }
      render();
    }, 1000);
  }
}

function reset() {
  clearInterval(interval);
  running = false;
  remaining = total;
  document.getElementById("start-btn").textContent = "start";
  document.getElementById("sublabel").textContent = MODES[mode].label;
  render();
}

function skip() {
  clearInterval(interval);
  running = false;
  remaining = 0;
  render();
  document.getElementById("sublabel").textContent = MODES[mode].done;
  document.getElementById("start-btn").textContent = "start";
  if (mode === "focus") {
    completedSessions = Math.min(4, completedSessions + 1);
    session = Math.min(4, session + 1);
  }
}

document.getElementById("ring").style.strokeDasharray = CIRCUMFERENCE;
document.getElementById("ring").style.strokeDashoffset = CIRCUMFERENCE;
render();
</script>
</body>
</html>
